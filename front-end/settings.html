<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adapt IA - Configurações</title>
  <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
  <link rel="stylesheet" href="assets/styles/index.css">
  <link rel="stylesheet" href="assets/styles/settings.css">
</head>
<body class="settings-body">

  <header class="settings-header">
    <div class="settings-header-left">
      <span class="settings-header-brand">Adapt IA</span>
      <div class="settings-header-divider"></div>
      <h1 class="settings-header-title">Configurações</h1>
    </div>
    <button class="settings-back-btn" onclick="window.location.href='index.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      Voltar
    </button>
  </header>

  <main class="settings-main">

    <!-- Perfil -->
    <section class="settings-card">
      <div class="settings-card-title">
        <span class="settings-card-title-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </span>
        <h2>Perfil</h2>
      </div>

      <div class="profile-info">
        <div class="profile-avatar" id="profileAvatar">—</div>
        <div class="profile-details">
          <p class="profile-email" id="profileEmail">Carregando...</p>
          <div class="profile-meta">
            <span class="profile-role-badge" id="profileRole"></span>
            <span class="profile-since" id="profileSince"></span>
          </div>
        </div>
      </div>
    </section>

    <!-- Segurança -->
    <section class="settings-card">
      <div class="settings-card-title">
        <span class="settings-card-title-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </span>
        <h2>Segurança</h2>
      </div>

      <form id="passwordForm" class="settings-form">
        <div class="settings-form-row">
          <div class="form-group">
            <label for="newPassword">Nova senha</label>
            <div class="input-wrapper">
              <input type="password" id="newPassword" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
              <button type="button" class="toggle-password" data-target="newPassword" aria-label="Mostrar senha">
                <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg class="eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              </button>
            </div>
          </div>
          <div class="form-group">
            <label for="confirmPassword">Confirmar senha</label>
            <div class="input-wrapper">
              <input type="password" id="confirmPassword" placeholder="Repita a nova senha" autocomplete="new-password">
              <button type="button" class="toggle-password" data-target="confirmPassword" aria-label="Mostrar senha">
                <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg class="eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.06M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              </button>
            </div>
          </div>
        </div>

        <p id="passwordMsg" class="settings-msg hidden"></p>

        <button type="submit" class="settings-submit-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          <span>Alterar senha</span>
        </button>
      </form>
    </section>

    <!-- Conta -->
    <section class="settings-card settings-card--danger">
      <div class="settings-card-title">
        <span class="settings-card-title-icon settings-card-title-icon--danger">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </span>
        <h2>Sessão</h2>
      </div>
      <p class="settings-danger-desc">Encerra sua sessão atual e redireciona para o login.</p>
      <button class="settings-danger-btn" id="logoutBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sair da conta
      </button>
    </section>

  </main>

  <script type="module" src="assets/js/settings.js"></script>
</body>
</html>
