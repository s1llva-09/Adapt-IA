<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adapt IA - Chat</title>
  <link rel="stylesheet" href="assets/styles/index.css">
</head>
<body class="chat-body">
  <button class="toggle-sidebar" onclick="toggleSidebar()">☰</button>

  <main class="chat-layout">
    <aside class="chat-sidebar">
      <div class="sidebar-header">
        <h2>Adapt IA</h2>
        <p>Converse naturalmente. A IA entende o contexto ao longo das mensagens.</p>
      </div>

      <div class="info-box">
        <p><strong>IA selecionada:</strong></p>
        <p><span id="providerLabel">-</span></p>
      </div>

      <div class="sidebar-actions">
        <button class="secondary-btn" onclick="clearChat()">Limpar conversa</button>
        <button class="secondary-btn" onclick="goBack()">Trocar IA</button>
        <button class="secondary-btn logout-btn" onclick="logout()">Sair</button>
      </div>
    </aside>

    <section class="chat-panel">
      <header class="chat-topbar">
        <h1>Seu chat inteligente</h1>
        <p>Faça perguntas, mude de assunto e deixe a IA se adaptar ao contexto.</p>
      </header>

      <div id="chatMessages" class="chat-messages"></div>

      <div id="chatForm" class="chat-form">
        <label class="file-btn" for="fileInput">
          <img src="assets/paperclip.svg" alt="Anexar arquivo" class="file-icon">
        </label>

        <input
          type="file"
          id="fileInput"
          class="file-input"
          accept=".txt,.js,.html,.css,.json,.md,.csv,.xml,.sql,.java,.py,.php,.c,.cpp,.pdf,.docx,.png,.jpg,.jpeg,.webp"
        >

        <div id="filePreview" class="file-preview"></div>

        <textarea
          id="messageInput"
          placeholder="Digite sua mensagem..."
          rows="1"
        ></textarea>

        <!-- IMPORTANTE: type="button" evita reload da página -->
        <button type="button" id="sendButton">Enviar</button>
      </div>
    </section>
  </main>

  <script type="module" src="assets/js/chat.js"></script>
</body>
</html>
