<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adapt IA - Chat</title>
  <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
  <link rel="stylesheet" href="assets/styles/index.css">
</head>
<body class="chat-body">
  <button class="toggle-sidebar" onclick="toggleSidebar()">☰</button>

  <main class="chat-layout">
    <aside class="chat-sidebar">
      <div class="sidebar-header">
        <h2>Adapt IA</h2>
      </div>

      <div class="sidebar-actions">
        <button class="sidebar-icon-btn" onclick="clearChat()" title="Nova conversa" aria-label="Nova conversa">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <button class="sidebar-icon-btn sidebar-icon-btn--danger" onclick="limparConversa()" title="Limpar conversa" aria-label="Limpar conversa">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
        </button>
        <button class="sidebar-icon-btn" onclick="goBack()" title="Trocar IA" aria-label="Trocar IA">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
      </div>

      <div class="info-box">
        <p><strong>Agente selecionado:</strong></p>
        <p><span id="agentLabel">-</span></p>
        <p class="info-box-detail">
          Motor: <span id="providerLabel">-</span>
        </p>
      </div>

      <!-- Lista de conversas antigas — preenchida pelo chat.js -->
      <div class="sidebar-conversations">
        <p class="sidebar-conversations-title">Histórico</p>
        <input type="text" id="conversationSearch" class="conversation-search" placeholder="Buscar conversa...">
        <div id="conversationList" class="conversation-list"></div>
      </div>

      <div class="sidebar-footer">
        <button class="logout-icon-btn" onclick="logout()">&#8592; Sair</button>
      </div>

    </aside>

    <section class="chat-panel">
      <header class="chat-topbar">
        <div class="chat-topbar-left">
          <h1>Seu chat inteligente</h1>
          <p>Faça perguntas, mude de assunto e deixe a IA se adaptar ao contexto.</p>
        </div>
        <button type="button" id="summaryButton" class="summary-btn" title="Gerar resumo executivo da conversa">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          Resumo
        </button>
      </header>

      <div id="chatMessages" class="chat-messages"></div>

      <!--
        Área separada para mostrar arquivo anexado.
        Isso evita que o arquivo fique dentro do input e diminua o tamanho do chat.
      -->
      <div id="attachmentArea" class="attachment-area hidden">
        <div id="filePreview" class="file-preview"></div>

        <button type="button" id="clearAttachmentButton" class="clear-attachment-btn">
          Remover
        </button>
      </div>

      <!--
        Status do processamento.
        Exemplo: "Lendo Excel...", "Analisando imagem..."
      -->
      <div id="uploadStatus" class="upload-status hidden"></div>

      <div id="chatForm" class="chat-form">
        <!--
          Botão do clipe.
          Agora ele abre um menu para escolher o tipo de arquivo.
        -->
        <button type="button" class="file-btn" id="fileMenuButton">+</button>

        <!-- Menu de tipos de arquivo -->
        <div id="fileTypeMenu" class="file-type-menu hidden">
          <button type="button" data-accept=".png,.jpg,.jpeg,.webp">
            Imagem
          </button>

          <button type="button" data-accept=".pdf">
            PDF
          </button>

          <button type="button" data-accept=".xlsx,.xls,.csv">
            Excel / CSV
          </button>

          <button type="button" data-accept=".txt,.js,.html,.css,.json,.md,.xml,.sql,.java,.py,.php,.c,.cpp,.docx">
            Texto / Código / Word
          </button>
        </div>

        <input
          type="file"
          id="fileInput"
          class="file-input"
          multiple
          accept=".txt,.js,.html,.css,.json,.md,.csv,.xml,.sql,.java,.py,.php,.c,.cpp,.pdf,.docx,.xlsx,.xls,.png,.jpg,.jpeg,.webp"
        >

        <textarea
          id="messageInput"
          placeholder="Digite sua mensagem..."
          rows="1"
        ></textarea>

        <!-- IMPORTANTE: type="button" evita reload da página -->
        <button type="button" id="sendButton">Enviar</button>
        <button type="button" id="stopStreamButton" class="stop-stream-btn hidden">&#9632; Parar</button>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script type="module" src="assets/js/chat.js?v=1000"></script>
</body>
</html>
