<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adapt IA</title>
  <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
  <link rel="stylesheet" href="assets/styles/index.css">
</head>
<body class="home-body">
  <main class="container">
    <section class="card-page">
      <h1>Escolha seu agente empresarial</h1>
      <p>
        Selecione o agente especialista que vai guiar a conversa. O provedor da IA
        continua disponível como motor de resposta.
      </p>

      <section class="provider-selector" aria-labelledby="providerTitle">
        <div>
          <h2 id="providerTitle">Motor da IA</h2>
          <p>
            Escolha qual tecnologia vai gerar as respostas.
          </p>
        </div>

        <div class="provider-options" aria-label="Escolha do provedor">
          <button class="provider-option is-selected" type="button" data-provider="gemini">
            Gemini
          </button>

          <button class="provider-option" type="button" data-provider="openai">
            OpenAI
          </button>
        </div>
      </section>

      <div class="cards agent-cards" aria-label="Agentes empresariais">
        <button onclick="abrirGestaoFinanceira()" class="choice-card" type="button" data-agent="financial_management">
          <span class="choice-card-kicker">Financeiro</span>
          <h2>Gestão Financeira</h2>
          <p>
            Fluxo de caixa, contas a pagar, contas a receber, custos, precificação e relatórios.
          </p>
        </button>

        <button class="choice-card" type="button" data-agent="personal_department">
          <span class="choice-card-kicker">DP</span>
          <h2>Departamento Pessoal</h2>
          <p>
            Admissões, demissões, folha, férias, ponto, benefícios e documentos.
          </p>
        </button>

        <button class="choice-card" type="button" data-agent="human_resources">
          <span class="choice-card-kicker">RH</span>
          <h2>Recursos Humanos</h2>
          <p>
            Recrutamento, clima, treinamento, desempenho, cargos e cultura organizacional.
          </p>
        </button>

        <button class="choice-card" type="button" data-agent="commercial_sales">
          <span class="choice-card-kicker">Comercial</span>
          <h2>Comercial e Vendas</h2>
          <p>
            Prospecção, CRM, propostas, negociação, follow-up e análise do funil.
          </p>
        </button>

        <button class="choice-card" type="button" data-agent="customer_service">
          <span class="choice-card-kicker">Atendimento</span>
          <h2>Atendimento ao Cliente</h2>
          <p>
            Scripts, suporte, pós-venda, padrões de resposta e experiência do cliente.
          </p>
        </button>

        <button class="choice-card" type="button" data-agent="operations">
          <span class="choice-card-kicker">Operações</span>
          <h2>Operações</h2>
          <p>
            Processos, rotinas internas, indicadores, produtividade e melhoria contínua.
          </p>
        </button>
      </div>
    </section>
  </main>

  <script type="module" src="assets/js/main.js"></script>
</body>
</html>
